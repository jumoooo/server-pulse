name: "✨ Task / Feature"
description: "frontend 기능 작업 이슈"
title: "[feat] "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 무엇을 만들거나 바꾸는지 적어주세요.
      placeholder: 대시보드 서버 카드 정렬 기준을 추가해요.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 배경
      description: 왜 필요한지 적어주세요.
      placeholder: 운영자가 문제 서버를 더 빨리 찾을 수 있어야 해요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 변경 범위
      description: 화면, 컴포넌트, 훅, 테스트 범위를 적어주세요.
      placeholder: dashboard page, server card component, RTL test
    validations:
      required: true
  - type: textarea
    id: cross_repo
    attributes:
      label: 교차 저장소 영향
      description: backend/root 연계가 있으면 적어주세요.
      placeholder: root parent issue 링크, backend child issue 필요 여부, env 영향

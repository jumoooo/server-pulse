name: "🐞 Bug"
description: "frontend 버그 수정 이슈"
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 증상
      description: 어떤 문제가 발생했는지 적어주세요.
      placeholder: 특정 페이지에서 로딩 상태가 끝나지 않아요.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      description: 재현 순서를 적어주세요.
      placeholder: 1. /dashboard 접속 2. 필터 클릭 3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 어떻게 동작해야 하는지 적어주세요.
      placeholder: 로딩 후 서버 카드가 정상적으로 표시돼야 해요.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: backend 계약, env, 다른 화면 영향이 있으면 적어주세요.
      placeholder: backend 응답 스키마 영향 없음 / root parent issue 필요 없음
